<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 130" role="img" aria-label="Partition d'urgence — logo">
  <title>Partition d'urgence</title>
  <g stroke="#e11d48">
    <line x1="12" y1="47" x2="218" y2="47" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
    <line x1="12" y1="56" x2="218" y2="56" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
    <line x1="12" y1="65" x2="218" y2="65" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
    <line x1="12" y1="74" x2="218" y2="74" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
    <line x1="12" y1="83" x2="218" y2="83" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- poutre + hampes -->
  <polygon points="53,31.7 182,37.1 182,43.1 53,37.7" fill="#e11d48"/>
  <rect x="60.8" y="31.7" width="2.4" height="29.7" fill="#e11d48"/>
  <rect x="116.8" y="34.4" width="2.4" height="37.8" fill="#e11d48"/>
  <rect x="170.8" y="37.1" width="2.4" height="43.2" fill="#e11d48"/>

  <!-- têtes de notes -->
  <circle cx="62" cy="61.4" r="10.6" fill="#e11d48"/>
  <circle cx="118" cy="72.2" r="10.6" fill="#e11d48"/>
  <circle cx="172" cy="80.3" r="10.6" fill="#e11d48"/>

  <!-- glyphe 1 : casque (régulation) -->
  <g fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round">
    <path d="M55.4 61 A6.6 6.6 0 0 1 68.6 61"/>
    <path d="M56.7 63.6 Q58 66.6 60.6 66.6" stroke-width="1.7"/>
  </g>
  <rect x="54.1" y="59" width="2.7" height="5.2" rx="1.1" fill="#ffffff"/>
  <rect x="67.2" y="59" width="2.7" height="5.2" rx="1.1" fill="#ffffff"/>
  <circle cx="60.6" cy="66.6" r="1.3" fill="#ffffff"/>

  <!-- glyphe 2 : ambulance (SMUR) -->
  <rect x="110.4" y="68.4" width="15.2" height="7.2" rx="1.7" fill="#ffffff"/>
  <rect x="122.2" y="66.6" width="2" height="2" rx="0.5" fill="#ffffff"/>
  <g fill="#e11d48">
    <rect x="113.5" y="69.3" width="2.2" height="5.4"/>
    <rect x="111.8" y="70.9" width="5.6" height="2.2"/>
  </g>
  <circle cx="114" cy="76" r="2" fill="#ffffff"/>
  <circle cx="122.4" cy="76" r="2" fill="#ffffff"/>
  <circle cx="114" cy="76" r="0.8" fill="#e11d48"/>
  <circle cx="122.4" cy="76" r="0.8" fill="#e11d48"/>

  <!-- glyphe 3 : hôpital -->
  <g fill="#ffffff">
    <rect x="167.9" y="74.3" width="2.4" height="12"/>
    <rect x="173.7" y="74.3" width="2.4" height="12"/>
    <rect x="167.9" y="79.1" width="8.2" height="2.4"/>
  </g>
</svg>
